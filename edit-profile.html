<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원정보 수정 | BEYOND THE SUMMIT</title>
    <script>if (!localStorage.getItem('bts_user')) { location.replace('login.html'); }</script>
    <link rel="stylesheet" href="edit-profile.css">
</head>
<body>
    <header>
        <h1><a href="index.html"><img src="images/logo.png" alt="BEYOND THE SUMMIT"></a></h1>
        <nav>
            <ul class="gnb">
                <li><a href="collection.html">컬렉션</a></li>
                <li><a href="technology.html">테크놀로지</a></li>
                <li><a href="expedition.html">익스페디션</a></li>
                <li><a href="story.html">스토리</a></li>
                <li><a href="store.html">스토어</a></li>
            </ul>
        </nav>
        <div class="header_util">
            <a href="#">검색</a>
            <a href="login.html">로그인</a>
            <a href="cart.html">장바구니</a>
        </div>
    </header>

    <main class="acct">
        <div class="crumb"><a href="index.html">홈</a><span>›</span><a href="mypage.html">마이페이지</a><span>›</span><strong>회원정보 수정</strong></div>
        <div class="acct_head">
            <div class="eyebrow">ACCOUNT</div>
            <h2>회원정보 수정</h2>
        </div>

        <form id="editForm" novalidate>
            <div class="field">
                <label for="email">이메일</label>
                <input type="email" id="email" value="" readonly>
            </div>
            <div class="field">
                <label for="name">이름</label>
                <input type="text" id="name" value="테스트 사용자">
            </div>
            <div class="field">
                <label for="phone">휴대폰</label>
                <input type="text" id="phone" value="010-1234-5678">
            </div>

            <div class="form_sec">
                <h3>비밀번호 변경</h3>
                <p class="desc">변경할 경우에만 입력하세요.</p>
                <div class="field">
                    <label for="curpw">현재 비밀번호</label>
                    <input type="password" id="curpw" placeholder="현재 비밀번호">
                </div>
                <div class="field">
                    <label for="newpw">새 비밀번호</label>
                    <input type="password" id="newpw" placeholder="8자 이상">
                </div>
                <div class="field">
                    <label for="newpw2">새 비밀번호 확인</label>
                    <input type="password" id="newpw2" placeholder="새 비밀번호 다시 입력">
                </div>
            </div>

            <div class="form_sec">
                <h3>마케팅 수신 동의</h3>
                <p class="desc">신제품 소식과 혜택 정보를 받아보세요.</p>
                <div class="toggle_row">
                    <span class="t">이메일 수신</span>
                    <label class="switch"><input type="checkbox" checked><span class="sl"></span></label>
                </div>
                <div class="toggle_row">
                    <span class="t">SMS 수신</span>
                    <label class="switch"><input type="checkbox"><span class="sl"></span></label>
                </div>
            </div>

            <div class="form_msg" id="formMsg" role="status" aria-live="polite"></div>

            <div class="acct_btns">
                <a class="btn_line" href="mypage.html">취소</a>
                <button class="btn_dark" type="submit">저장</button>
            </div>
        </form>

        <div class="withdraw">
            <button type="button" id="withdrawBtn">회원 탈퇴</button>
        </div>
    </main>

    <div class="modal_dim" id="withdrawModal" role="dialog" aria-modal="true" aria-labelledby="wdTitle">
        <div class="modal_card">
            <h4 id="wdTitle">정말 탈퇴하시겠어요?</h4>
            <p>탈퇴하면 주문 내역, 적립금, 위시리스트 등<br>모든 정보가 삭제되며 복구할 수 없습니다.</p>
            <div class="modal_btns">
                <button type="button" class="cancel" id="wdCancel">취소</button>
                <button type="button" class="danger" id="wdConfirm">탈퇴하기</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('email').value = localStorage.getItem('bts_user') || '';
        var form = document.getElementById('editForm');
        var msg = document.getElementById('formMsg');
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            var name = document.getElementById('name').value.trim();
            var cur = document.getElementById('curpw').value;
            var np = document.getElementById('newpw').value;
            var np2 = document.getElementById('newpw2').value;
            if (!name) { msg.className = 'form_msg err'; msg.textContent = '이름을 입력해 주세요.'; return; }
            if (np || np2 || cur) {
                if (!cur) { msg.className = 'form_msg err'; msg.textContent = '현재 비밀번호를 입력해 주세요.'; return; }
                if (np.length < 8) { msg.className = 'form_msg err'; msg.textContent = '새 비밀번호는 8자 이상이어야 합니다.'; return; }
                if (np !== np2) { msg.className = 'form_msg err'; msg.textContent = '새 비밀번호가 일치하지 않습니다.'; return; }
            }
            msg.className = 'form_msg ok';
            msg.textContent = '회원정보가 저장되었습니다. (데모 사이트)';
        });

        // 회원 탈퇴
        var wdModal = document.getElementById('withdrawModal');
        function openWd() { wdModal.classList.add('show'); document.body.style.overflow = 'hidden'; }
        function closeWd() { wdModal.classList.remove('show'); document.body.style.overflow = ''; }
        document.getElementById('withdrawBtn').addEventListener('click', openWd);
        document.getElementById('wdCancel').addEventListener('click', closeWd);
        wdModal.addEventListener('click', function (e) { if (e.target === wdModal) closeWd(); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && wdModal.classList.contains('show')) closeWd(); });
        document.getElementById('wdConfirm').addEventListener('click', function () {
            localStorage.removeItem('bts_user');
            alert('회원 탈퇴가 완료되었습니다. 이용해 주셔서 감사합니다. (데모 사이트)');
            location.href = 'index.html';
        });
    </script>
    <script src="search.js" defer></script>
    <script src="footer.js" defer></script>
    <script src="mobile-nav.js" defer></script>
</body>
</html>
