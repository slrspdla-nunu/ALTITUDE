<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>animation_연습</title>
    <style>
        * {margin: 0; padding: 0;}
        li {list-style: none;}
        a {text-decoration: none; color: #000;}
        img {vertical-align: top;}

        html {scrollbar-gutter: stable;}
        body {overflow-y: hidden;}

        @font-face {
            @font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2');

}

@font-face {

    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2');
    font-weight: 200;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2');

    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';

    font-weight: 400;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
    font-weight: 600;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2');
    font-weight: 800;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2');
    font-weight: 900;
    font-display: swap;
}
        }

        body {font-family: 'Pretendard';}

        .bg_box .bg1 .img2 {width: 100%; height: 100vh; object-fit: cover; position: absolute; left: 0; top: 0;  animation: bgAni 10s forwards;}
        @keyframes bgAni {0% {height: 180%;} 100% {height: 100%;}}

        .bg_box .bg1 .img1 {position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 4; animation: human 5s forwards;}
        @keyframes human {0%{height: 80%;} 100%{height: 50%;}}

        header {position: absolute; max-width: 1400px; left: 50%; top: 0; transform: translateX(-50%); display: flex; justify-content: space-between; align-items: center; width: 100%; z-index: 15;}
        header h1 {width: 100px;}
        header h1 img {width: 100%;}
        header nav {}
        header nav .gnb {display: flex;}
        header nav .gnb li {font-size: 18px; font-weight: 500; transition: 0.25s;
        text-shadow: 0 0 30px rgba(0,0,0,1),
                       0 0 30px rgba(0,0,0,1),
                        0 0 30px rgba(0,0,0,1),
                        0 0 30px rgba(0,0,0,1),
                        0 0 30px rgba(0,0,0,1);}
        header nav .gnb li a {color: #fff; display: block; padding: 10px 30px;}

        header nav .gnb:hover li {transform: scale(0.9); opacity: 0.7;}
        header nav .gnb li:hover {transform: scale(1.1); opacity: 1;}
        header nav .gnb li:hover a {color: rgb(131, 236, 255);}
        header .header_util {display: flex; align-items: center; gap: 20px;}
        header .header_util a {color: #fff; font-size: 14px; font-weight: 600; text-shadow: 0 0 24px rgba(0,0,0,0.9); transition: 0.2s;}
        header .header_util a:hover {color: rgb(131, 236, 255);}

        .textbox {position: absolute; top: 41%; left: 50%; transform: translate(-50%, -50%); z-index: 5; text-align: center; width: 100%;}
        .textbox ul {}
        .textbox li {font-size: 0; font-weight: 800; color: #fff; line-height: 0.95; letter-spacing: 0; text-shadow: 0 0 30px rgb(0, 22, 39);}
        .textbox li.text2 {margin-top: 22px;}
        .textbox li.text2 span {font-size: 34px; font-weight: 500; color: #fff; line-height: 1.4;}
        .textbox li span {font-size: 132px; display: inline-block;}
        .textbox li span.mb50 {margin-right: 42px;}
        .textbox li.text2 span.mb50 {margin-right: 12px;}

        .snow_box{}
        .snow_box .snow1 {position: absolute; background: url(images/snow3.png); width: 100%; height: 100vh; left: 0; top: 0; animation: snow1 10s infinite linear; z-index: 10;}

        @keyframes snow1 {0% {background-position: 0 0;} 100% {background-position: 0 900px;}}

        .snow_box .snow2 {position: absolute; background: url(images/snow2.png); width: 100%; height: 100vh;left: 0; top: 0; animation: snow2 15s infinite linear; background-size: 50%;}

        @keyframes snow2 {0% {background-position: 0 0;} 100% {background-position: 400px 900px;}}

    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1><a href="index.html"><img src="images/logo.png" alt="BEYOND THE SUMMIT"></a></h1>
            <nav>
                <ul class="gnb">
                    <li><a href="collection.html">컬렉션</a></li>
                    <li><a href="#">테크놀로지</a></li>
                    <li><a href="#">익스페디션</a></li>
                    <li><a href="#">스토리</a></li>
                    <li><a href="#">스토어</a></li>
                </ul>
            </nav>
            <div class="header_util">
                <a href="#">검색</a>
                <a href="#">로그인</a>
                <a href="#">장바구니</a>
            </div>
        </header>

        <div class="textbox">
            <ul>
                <li>
                    <span>B</span>
                    <span>E</span>
                    <span>Y</span>
                    <span>O</span>
                    <span>N</span>
                    <span class="mb50">D</span>
                    <span>T</span>
                    <span>H</span>
                    <span class="mb50">E</span>
                    <span>S</span>
                    <span>U</span>
                    <span>M</span>
                    <span>M</span>
                    <span>I</span>
                    <span>T</span>
                </li>
                <li class="text2">
                    <span>한</span>
                    <span>계</span>
                    <span>를</span>
                    <span class="mb50">넘어,</span>
                    <span>가</span>
                    <span>장</span>
                    <span class="mb50">차가운</span>
                    <span>곳</span>
                    <span>까</span>
                    <span>지.</span>
                </li>
            </ul>
        </div>

        <div class="bg_box">
            <div class="bg1">
                <img src="images/bg1.png" alt="" class="img1">
                <img src="images/bg2.png" alt="" class="img2">
            </div>
        </div>

        <div class="snow_box">
            <div class="snow1"></div>
            <div class="snow2"></div>
        </div>
    </div>
    
</body>
</html>
