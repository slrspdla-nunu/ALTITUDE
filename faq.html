<html lang="ko">

    <meta charset="UTF-8">

    <link rel="stylesheet" href="faq.css?v=6">
</head>
<body>
    <header>
        <h1><a href="index.html"><img src="images/logo.png" alt="BEYOND THE SUMMIT"></a></h1>
        <nav>
            <ul class="gnb">
                <li><a href="collection.html">컬렉션</a></li>
                <li><a href="technology.html">테크놀로지</a></li>
                <li><a href="expedition.html">익스페디션</a></li>
                <li><a href="story.html">스토리</a></li>
                <li><a href="store.html">스토어</a></li>
            </ul>
        </nav>
        <div class="header_util">
            <a href="#">검색</a>
            <a href="login.html">로그인</a>
            <a href="cart.html">장바구니</a>
        </div>
    </header>

    <main class="acct">
        <div class="crumb"><a href="index.html">홈</a><span>›</span><strong>고객센터</strong></div>
        <div class="acct_head">
            <div class="eyebrow">SUPPORT</div>
            <h2>고객센터</h2>
            <p>자주 묻는 질문을 확인해 보세요. 원하는 답을 찾지 못했다면 1:1 문의로 도와드립니다.</p>
        </div>

        <div class="faq_search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input type="text" id="faqSearch" placeholder="궁금한 내용을 검색해 보세요">
        </div>

        <div class="faq_tabs" id="faqTabs">
            <button type="button" data-cat="all" class="active">전체</button>
            <button type="button" data-cat="주문·결제">주문·결제</button>
            <button type="button" data-cat="배송">배송</button>
            <button type="button" data-cat="교환·반품">교환·반품</button>
            <button type="button" data-cat="회원">회원</button>
            <button type="button" data-cat="상품">상품</button>
        </div>

        <div class="qlist" id="faqList"></div>
        <div class="faq_empty" id="faqEmpty" style="display:none;">검색 결과가 없습니다.</div>

        <div class="cs_banner">
            <div>
                <div class="t">원하는 답을 찾지 못하셨나요?</div>
                <div class="d">1:1 문의를 남겨주시면 평일 10:00–18:00에 순차적으로 답변드립니다.</div>
            </div>
            <a href="inquiry.html">1:1 문의하기</a>
        </div>
    </main>

    <script>
        var FAQ = [
            { cat: '배송', q: '주문한 상품은 언제 배송되나요?', a: '결제 완료 후 평균 1~3영업일 이내에 출고되며, 택배 배송은 보통 출고 후 1~2일 소요됩니다. 주문 상세 페이지에서 실시간 배송 현황과 운송장 번호를 확인하실 수 있습니다.' },
            { cat: '배송', q: '배송비는 얼마인가요?', a: '5만원 이상 구매 시 무료배송이며, 미만일 경우 배송비 3,000원이 부과됩니다. 제주·도서산간 지역은 추가 배송비가 발생할 수 있습니다.' },
            { cat: '교환·반품', q: '교환·반품은 어떻게 신청하나요?', a: '마이페이지 > 주문 내역 > 주문 상세에서 "교환·반품 신청" 버튼으로 접수하실 수 있습니다. 상품 수령 후 7일 이내 신청 가능하며, 단순 변심의 경우 왕복 배송비가 부과됩니다.' },
            { cat: '교환·반품', q: '사이즈 교환도 가능한가요?', a: '가능합니다. 동일 상품의 다른 사이즈로 교환하실 수 있으며, 재고 상황에 따라 처리 기간이 달라질 수 있습니다. 착용·세탁하지 않은 상태의 상품만 교환됩니다.' },
            { cat: '주문·결제', q: '어떤 결제 수단을 사용할 수 있나요?', a: '신용·체크카드, 실시간 계좌이체, 무통장 입금, 간편결제(Pay)를 지원합니다. 주문서 작성 단계에서 원하는 결제 수단을 선택하실 수 있습니다.' },
            { cat: '주문·결제', q: '주문을 취소하고 싶어요.', a: '배송 준비 전 단계라면 주문 상세에서 직접 취소가 가능합니다. 이미 배송이 시작된 경우 반품 절차로 진행되며, 고객센터로 문의해 주시면 도와드립니다.' },
            { cat: '회원', q: '적립금은 어떻게 사용하나요?', a: '주문서 작성 시 "적립금" 입력란에 사용할 금액을 입력하면 결제 금액에서 차감됩니다. 보유 적립금은 마이페이지 멤버십 카드에서 확인하실 수 있습니다.' },
            { cat: '회원', q: '등급 혜택이 궁금해요.', a: 'SUMMIT 등급은 구매 금액에 따라 산정되며, 등급별로 적립률과 전용 쿠폰 혜택이 제공됩니다. 자세한 등급 기준은 마이페이지에서 확인하실 수 있습니다.' },
            { cat: '상품', q: '다운 제품의 필파워는 무엇을 의미하나요?', a: '필파워는 다운의 복원력과 보온성을 나타내는 수치로, 높을수록 적은 무게로 더 많은 공기를 품어 따뜻합니다. 당사 익스페디션 라인은 900 필파워 구스다운을 사용합니다.' },
            { cat: '상품', q: '방수 제품의 관리 방법을 알려주세요.', a: '방수·투습 셸은 전용 세제로 단독 세탁하고, 건조 후 낮은 온도로 다림질하면 발수 기능이 회복됩니다. 섬유 유연제와 표백제는 기능을 손상시키므로 사용하지 마세요.' }
        ];

        function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

        var listEl = document.getElementById('faqList');
        var emptyEl = document.getElementById('faqEmpty');
        var searchEl = document.getElementById('faqSearch');
        var curCat = 'all';

        function render() {
            var kw = searchEl.value.trim().toLowerCase();
            var items = FAQ.filter(function (f) {
                var okCat = curCat === 'all' || f.cat === curCat;
                var okKw = !kw || f.q.toLowerCase().indexOf(kw) > -1 || f.a.toLowerCase().indexOf(kw) > -1;
                return okCat && okKw;
            });
            listEl.innerHTML = items.map(function (f) {
                return '<div class="qitem">' +
                    '<button class="qhead" type="button">' +
                    '<span class="qmark">Q</span>' +
                    '<span class="cat">' + esc(f.cat) + '</span>' +
                    '<span class="qt">' + esc(f.q) + '</span>' +
                    '<span class="chev">▾</span></button>' +
                    '<div class="qbody"><div class="a">' + esc(f.a) + '</div></div>' +
                    '</div>';
            }).join('');
            emptyEl.style.display = items.length ? 'none' : 'block';
        }

        listEl.addEventListener('click', function (e) {
            var head = e.target.closest('.qhead');
            if (head) head.parentElement.classList.toggle('open');
        });
        document.getElementById('faqTabs').addEventListener('click', function (e) {
            var btn = e.target.closest('button');
            if (!btn) return;
            this.querySelectorAll('button').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            curCat = btn.dataset.cat;
            render();
        });
        searchEl.addEventListener('input', render);
        render();
    </script>
    <script src="search.js?v=6" defer></script>
    <script src="footer.js?v=6" defer></script>
    <script src="mobile-nav.js?v=6" defer></script>
</body>
</html>
