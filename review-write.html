<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 작성 | BEYOND THE SUMMIT</title>
    <script>if (!localStorage.getItem('bts_user')) { location.replace('login.html'); }</script>
    <link rel="stylesheet" href="review-write.css">
</head>
<body>
    <header>
        <h1><a href="index.html"><img src="images/logo.png" alt="BEYOND THE SUMMIT"></a></h1>
        <nav>
            <ul class="gnb">
                <li><a href="collection.html">컬렉션</a></li>
                <li><a href="technology.html">테크놀로지</a></li>
                <li><a href="expedition.html">익스페디션</a></li>
                <li><a href="story.html">스토리</a></li>
                <li><a href="store.html">스토어</a></li>
            </ul>
        </nav>
        <div class="header_util">
            <a href="#">검색</a>
            <a href="login.html">로그인</a>
            <a href="cart.html">장바구니</a>
        </div>
    </header>

    <main class="acct">
        <div class="crumb"><a href="index.html">홈</a><span>›</span><a href="mypage.html">마이페이지</a><span>›</span><strong>리뷰 작성</strong></div>
        <div class="acct_head">
            <div class="eyebrow">WRITE REVIEW</div>
            <h2>리뷰 작성</h2>
        </div>

        <div class="rv_product">
            <img src="images/product-fleece.png" alt="그리드 웜 미드레이어">
            <div>
                <div class="b">ALTITUDE</div>
                <div class="nm">그리드 웜 미드레이어</div>
                <div class="op">그레이 / L</div>
            </div>
        </div>

        <form id="reviewForm" novalidate>
            <div class="field">
                <label>별점</label>
                <div class="stars_pick" id="starsPick">
                    <button type="button" aria-label="1점">★</button>
                    <button type="button" aria-label="2점">★</button>
                    <button type="button" aria-label="3점">★</button>
                    <button type="button" aria-label="4점">★</button>
                    <button type="button" aria-label="5점">★</button>
                </div>
                <div class="stars_label" id="starsLabel">별점을 선택해 주세요</div>
            </div>

            <div class="field">
                <label for="rvText">리뷰 내용</label>
                <textarea id="rvText" placeholder="상품에 대한 솔직한 후기를 남겨주세요. (최소 10자)"></textarea>
            </div>

            <div class="field">
                <label>사진 첨부 <span style="font-weight:600;color:#8a98a5;">(선택 · 최대 5장)</span></label>
                <div class="upload_row" id="uploadRow">
                    <label class="upload_btn"><span class="ic">＋</span>사진<input type="file" id="rvPhotos" accept="image/*" multiple></label>
                </div>
                <p class="upload_hint">JPG, PNG 등 이미지 파일을 첨부할 수 있어요.</p>
            </div>

            <div class="form_msg" id="formMsg" role="status" aria-live="polite"></div>

            <div class="acct_btns">
                <a class="btn_line" href="mypage.html">취소</a>
                <button class="btn_dark" type="submit">리뷰 등록</button>
            </div>
        </form>
    </main>

    <script>
        var LABELS = ['별점을 선택해 주세요', '별로예요', '그저 그래요', '보통이에요', '좋아요', '최고예요'];
        var rating = 0;
        var starBtns = document.querySelectorAll('#starsPick button');
        var starsLabel = document.getElementById('starsLabel');
        function paint(n) { starBtns.forEach(function (b, i) { b.classList.toggle('on', i < n); }); starsLabel.textContent = LABELS[n]; }
        starBtns.forEach(function (b, i) { b.addEventListener('click', function () { rating = i + 1; paint(rating); }); });

        // 사진 첨부
        var MAX = 5, files = [];
        var uploadRow = document.getElementById('uploadRow');
        var uploadBtn = uploadRow.querySelector('.upload_btn');
        var fileInput = document.getElementById('rvPhotos');
        function renderPreviews() {
            uploadRow.querySelectorAll('.preview').forEach(function (p) { URL.revokeObjectURL(p.dataset.url); p.remove(); });
            files.forEach(function (f, idx) {
                var url = URL.createObjectURL(f);
                var d = document.createElement('div');
                d.className = 'preview'; d.dataset.url = url;
                d.innerHTML = '<img src="' + url + '" alt=""><button type="button" class="del" aria-label="삭제">×</button>';
                d.querySelector('.del').addEventListener('click', function () { files.splice(idx, 1); renderPreviews(); });
                uploadRow.insertBefore(d, uploadBtn);
            });
            uploadBtn.style.display = files.length >= MAX ? 'none' : '';
        }
        fileInput.addEventListener('change', function () {
            Array.from(fileInput.files).forEach(function (f) { if (files.length < MAX) files.push(f); });
            fileInput.value = '';
            renderPreviews();
        });

        var msg = document.getElementById('formMsg');
        document.getElementById('reviewForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var text = document.getElementById('rvText').value.trim();
            if (!rating) { msg.className = 'form_msg err'; msg.textContent = '별점을 선택해 주세요.'; return; }
            if (text.length < 10) { msg.className = 'form_msg err'; msg.textContent = '리뷰 내용을 10자 이상 입력해 주세요.'; return; }
            msg.className = 'form_msg ok'; msg.textContent = '리뷰가 등록되었습니다. (데모 사이트)';
        });
    </script>
    <script src="search.js" defer></script>
    <script src="footer.js" defer></script>
    <script src="mobile-nav.js" defer></script>
</body>
</html>
