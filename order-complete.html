<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 완료 | BEYOND THE SUMMIT</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=8">
    <link rel="stylesheet" href="common.css?v=8">
    <link rel="stylesheet" href="order-complete.css?v=8">
</head>
<body>
    <header>
        <h1><a href="index.html"><img src="images/logo.png" alt="BEYOND THE SUMMIT"></a></h1>
        <nav>
            <ul class="gnb">
                <li><a href="collection.html">컬렉션</a></li>
                <li><a href="technology.html">테크놀로지</a></li>
                <li><a href="expedition.html">익스페디션</a></li>
                <li><a href="story.html">스토리</a></li>
                <li><a href="store.html">스토어</a></li>
            </ul>
        </nav>
        <div class="header_util">
            <a href="#">검색</a>
            <a href="login.html">로그인</a>
            <a href="cart.html">장바구니</a>
        </div>
    </header>

    <main class="cart">
        <div class="steps">
            <div class="s done"><span class="num">1</span>장바구니</div>
            <span class="sep">›</span>
            <div class="s done"><span class="num">2</span>주문서 작성</div>
            <span class="sep">›</span>
            <div class="s on"><span class="num">3</span>주문 완료</div>
        </div>

        <div class="done_hero">
            <div class="done_check"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5 11-11"/></svg></div>
            <h2>주문이 완료되었습니다</h2>
            <p>주문해 주셔서 감사합니다.<br>배송 시작 시 등록하신 연락처로 안내드립니다.</p>
        </div>

        <div class="done_box">
            <div class="r"><span class="k">주문번호</span><span class="v" id="ocNo">-</span></div>
            <div class="r"><span class="k">결제금액</span><span class="v amt" id="ocTotal">-</span></div>
            <div class="r"><span class="k">적립 예정</span><span class="v point" id="ocPoint">-</span></div>
            <div class="r"><span class="k">배송 예정</span><span class="v" id="ocEta">-</span></div>
        </div>

        <div class="done_btns">
            <a class="btn_line" href="store.html">쇼핑 계속하기</a>
            <a class="btn_dark" href="order-list.html">주문 내역 보기</a>
        </div>
    </main>

    <script>
        function won(n) { return n.toLocaleString('en-US') + '원'; }
        var total = parseInt(new URLSearchParams(location.search).get('total'), 10);
        if (isNaN(total) || total < 0) total = 1016000;

        document.getElementById('ocNo').textContent = '20260702-0031';
        document.getElementById('ocTotal').textContent = won(total);
        document.getElementById('ocPoint').textContent = Math.floor(total * 0.03).toLocaleString('en-US') + 'P';
        document.getElementById('ocEta').textContent = '2026.07.04 ~ 07.05';
    </script>
    <script src="search.js?v=8" defer></script>
    <script src="footer.js?v=8" defer></script>
    <script src="mobile-nav.js?v=8" defer></script>
